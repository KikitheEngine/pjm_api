<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YUKI PM</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f8;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 10px 18px;
}

.header img {
  height: 40px;
  margin-right: 8px;
  margin-left: -6px;
}

.header h1 {
  font-size: 20px;
  font-weight: 600;
  margin: 0;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 12px 18px 18px;
}

/* PANELS */
.panel {
  background: white;
  border-radius: 8px;
  border: 1px solid #d9dee7;
  padding: 10px;
  display: flex;
  flex-direction: column;
  height: 500px;
}

.panel h2 {
  margin: 0 0 6px 0;
  font-size: 14px;
  font-weight: 600;
}

/* CONTROLS */
.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 8px;
}

.controls input,
.controls textarea {
  padding: 6px;
  font-size: 12px;
  border: 1px solid #c9cfda;
  border-radius: 6px;
}

.controls textarea {
  grid-column: span 2;
  height: 50px;
}

.controls button {
  grid-column: span 2;
  height: 28px;
  font-size: 12px;
  border: none;
  border-radius: 6px;
  background: #1f4ea3;
  color: white;
  cursor: pointer;
}

.controls button.secondary {
  background: #6b7280;
}

/* LIST */
.list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* ITEM */
.item {
  border: 1px solid #d8dde6;
  padding: 6px 8px;
  border-radius: 6px;
  font-size: 12px;
  background: #fafbfc;
  cursor: pointer;
}

.item:hover {
  background: #eef3ff;
}

.item.active {
  background: #e6edff;
  border-color: #1f4ea3;
}

.item.gray {
  opacity: 0.5;
}

/* SUBACTION */
.sub {
  display: flex;
  align-items: flex-start;
  gap: 6px;
}

.sub input {
  margin-top: 2px;
}
</style>
</head>

<body>

<div class="header">
  <img src="/static/Logo.png">
  <h1>YUKI Project Manager</h1>
</div>

<div class="container">

<!-- USERS -->
<div class="panel">
  <h2>Users</h2>

  <div class="controls">
    <input id="userName" placeholder="Name">
    <input id="userEmail" placeholder="Email">
    <button onclick="createUser()">Create</button>
    <button class="secondary" onclick="loadUsers()">Load</button>
  </div>

  <div id="users" class="list"></div>
</div>

<!-- PROJECTS -->
<div class="panel">
  <h2>Projects</h2>

  <div class="controls">
    <input id="pName" placeholder="Name">
    <input id="pType" placeholder="Type">
    <button onclick="createProject()">Create</button>
    <button class="secondary" onclick="loadProjects()">Load</button>
  </div>

  <div id="projects" class="list"></div>
</div>

<!-- ACTIONS -->
<div class="panel">
  <h2>Actions</h2>

  <div class="controls">
    <input id="aName" placeholder="Name">
    <input id="aPriority" placeholder="Priority">
    <textarea id="aDesc" placeholder="Description"></textarea>
    <button onclick="createAction()">Create</button>
    <button class="secondary" onclick="loadActions()">Load</button>
  </div>

  <div id="actions" class="list"></div>
</div>

<!-- SUBACTIONS -->
<div class="panel">
  <h2>Subactions</h2>

  <div class="controls">
    <input id="sName" placeholder="Name">
    <input id="sPriority" placeholder="Priority">
    <textarea id="sDesc" placeholder="Description"></textarea>

    <label style="font-size:12px;">
      <input type="checkbox" id="sStatus"> Complete
    </label>

    <button onclick="createSub()">Create</button>
    <button class="secondary" onclick="loadSubs()">Load</button>
  </div>

  <div id="subs" class="list"></div>
</div>

</div>

<script>
const API = "http://127.0.0.1:8000";

let proj = null;
let act = null;

/* USERS */
async function loadUsers() {
  let r = await fetch(API + "/users");
  let d = await r.json();
  let el = document.getElementById("users");
  el.innerHTML = "";

  d.forEach(x => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = x.name;
    el.appendChild(div);
  });
}

async function createUser() {
  let n = userName.value;
  let e = userEmail.value;
  await fetch(`${API}/users?name=${n}&email=${e}`, {method:"POST"});
  loadUsers();
}

/* PROJECTS */
async function loadProjects() {
  let r = await fetch(API + "/projects");
  let d = await r.json();
  let el = document.getElementById("projects");
  el.innerHTML = "";

  d.forEach(x => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<b>${x.name}</b><br>${x.type}`;

    div.onclick = () => {
      proj = x.id;
      act = null;
      document.querySelectorAll("#projects .item").forEach(i=>i.classList.remove("active"));
      div.classList.add("active");
      loadActions();
    };

    el.appendChild(div);
  });
}

async function createProject() {
  let n = pName.value;
  let t = pType.value;
  await fetch(`${API}/projects?name=${n}&type=${t}`, {method:"POST"});
  loadProjects();
}

/* ACTIONS */
async function loadActions() {
  if (!proj) return;

  let r = await fetch(`${API}/actions?project_id=${proj}`);
  let d = await r.json();
  let el = document.getElementById("actions");
  el.innerHTML = "";

  d.forEach(x => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<b>${x.name}</b><br>${x.priority}`;

    div.onclick = () => {
      act = x.id;
      document.querySelectorAll("#actions .item").forEach(i=>i.classList.remove("active"));
      div.classList.add("active");
      loadSubs();
    };

    el.appendChild(div);
  });
}

async function createAction() {
  if (!proj) return alert("select project");

  await fetch(`${API}/actions?name=${aName.value}&priority=${aPriority.value}&description=${aDesc.value}&project=${proj}`, {method:"POST"});
  loadActions();
}

/* SUBACTIONS */
async function loadSubs() {
  if (!act) return;

  let r = await fetch(`${API}/subactions?action_id=${act}`);
  let d = await r.json();
  let el = document.getElementById("subs");
  el.innerHTML = "";

  d.forEach(x => {
    let div = document.createElement("div");
    div.className = "item " + (x.status ? "gray" : "");

    div.innerHTML = `
      <div class="sub">
        <input type="checkbox" ${x.status ? "checked":""}
          onchange="toggle(${x.id}, this.checked)">
        <div>
          <b>${x.name}</b><br>
          ${x.priority}
        </div>
      </div>
    `;

    el.appendChild(div);
  });
}

async function createSub() {
  if (!act) return alert("select action");

  await fetch(`${API}/subactions?name=${sName.value}&description=${sDesc.value}&priority=${sPriority.value}&action=${act}&status=${sStatus.checked}`, {method:"POST"});
  loadSubs();
}

async function toggle(id, status) {
  await fetch(`${API}/subactions/${id}/status?status=${status}`, {method:"PUT"});
  loadSubs();
}

/* INIT */
loadUsers();
loadProjects();
</script>

</body>
</html>
