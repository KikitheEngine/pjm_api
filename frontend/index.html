<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y.U.K.I</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    background: #f5f6f8;
    color: #222;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
}

.header-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.2;
}

.subtitle {
    font-size: 12px;
    font-weight: 400;
    color: #777;
    line-height: 1.2;
}

.logo {
    height: 32px;
    width: auto;
    object-fit: contain;
    display: block;
}

.layout {
    display: flex;
    gap: 16px;
    align-items: flex-start;
}

.main {
    flex: 1;
    min-width: 0;
}

.sidebar {
    width: 220px;
    flex-shrink: 0;
}

.section {
    background: #fff;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
}

.section-title {
    margin: 0 0 10px 0;
    font-size: 12px;
    font-weight: 500;
    line-height: 1.2;
}

.toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
}

.row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-top: 10px;
}

input,
select,
textarea,
button,
.list-item,
.meta,
.section-title,
.subtitle,
h1 {
    font-family: 'Inter', sans-serif;
}

input,
select,
textarea {
    width: 100%;
    height: 30px;
    padding: 6px 8px;
    border: 1px solid #dcdcdc;
    border-radius: 6px;
    background: #fff;
    font-size: 12px;
    font-weight: 400;
    line-height: 1.2;
    color: #222;
    text-align: left;
}

textarea {
    resize: none;
    min-height: 30px;
    padding-top: 7px;
}

input::placeholder,
textarea::placeholder {
    color: #999;
    font-size: 12px;
    font-weight: 400;
    line-height: 1.2;
}

select {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
}

.button-row {
    margin-top: 12px;
    display: flex;
    gap: 8px;
}

button {
    height: 26px;
    padding: 0 10px;
    border: none;
    border-radius: 6px;
    background: #007aff;
    color: #fff;
    font-size: 12px;
    font-weight: 400;
    line-height: 1;
    cursor: pointer;
    width: auto;
}

button:hover {
    background: #0065d1;
}

button.delete-btn {
    background: #e5e7eb;
    color: #333;
}

button.delete-btn:hover {
    background: #d8dbe1;
}

.list {
    display: flex;
    flex-direction: column;
    border-top: 1px solid #eee;
}

.list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    min-height: 38px;
    padding: 8px 10px;
    border-bottom: 1px solid #eee;
    background: #fff;
}

.list-item:hover {
    background: #f7faff;
}

.item-main {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    flex: 1;
    cursor: pointer;
}

.item-text {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.item-title {
    font-size: 12px;
    font-weight: 400;
    line-height: 1.2;
    color: #222;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.meta {
    font-size: 12px;
    font-weight: 400;
    line-height: 1.2;
    color: #777;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.item-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
}

.item-checkbox {
    width: 14px;
    height: 14px;
    margin: 0;
    flex-shrink: 0;
}

.selected {
    background: #eef5ff;
}

.empty-state {
    padding: 10px;
    color: #888;
    font-size: 12px;
    border-top: 1px solid #eee;
    border-bottom: 1px solid #eee;
}

.status-bar {
    margin-bottom: 10px;
    color: #666;
    font-size: 12px;
}
</style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <h1>Project Management Tool</h1>
        <div class="subtitle">Y.U.K.I Suite</div>
    </div>

    <img
        src="/static/Logo.png"
        class="logo"
        alt="Y.U.K.I Logo"
        onerror="this.style.display='none'; console.log('Logo failed to load from /static/Logo.png');"
    >
</div>

<div class="layout">
    <div class="main">

        <div class="section">
            <div class="section-title">Projects</div>

            <div class="toolbar">
                <button type="button" onclick="loadProjects()">Load</button>
            </div>

            <div id="projects" class="list"></div>

            <div class="row">
                <input id="p_name" placeholder="Project Name">
                <select id="p_type">
                    <option value="">Type</option>
                    <option value="Subk">Subk</option>
                    <option value="IWO">IWO</option>
                    <option value="Quest">Quest</option>
                </select>
                <select id="p_segment">
                    <option value="">Segment</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
                <input id="p_supplier" placeholder="Supplier">
                <input id="p_value" placeholder="Value">
                <select id="p_priority">
                    <option value="">Priority</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
                <input id="p_due" type="date">
                <input id="p_user" placeholder="User ID">
            </div>

            <div class="button-row">
                <button type="button" onclick="createProject()">Create</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Actions</div>
            <div id="actionsStatus" class="status-bar">Select a project</div>
            <div id="actions" class="list"></div>

            <div class="row">
                <input id="a_name" placeholder="Action Name">
                <select id="a_priority">
                    <option value="">Priority</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
                <input id="a_due" type="date">
                <textarea id="a_desc" placeholder="Description"></textarea>
                <input id="a_project" placeholder="Project ID">
            </div>

            <div class="button-row">
                <button type="button" onclick="createAction()">Create</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Subactions</div>
            <div id="subactionsStatus" class="status-bar">Select an action</div>
            <div id="subactions" class="list"></div>

            <div class="row">
                <input id="s_name" placeholder="Subaction Name">
                <select id="s_priority">
                    <option value="">Priority</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
                <input id="s_due" type="date">
                <textarea id="s_desc" placeholder="Description"></textarea>
                <input id="s_action" placeholder="Action ID">
            </div>

            <div class="button-row">
                <button type="button" onclick="createSubaction()">Create</button>
            </div>
        </div>

    </div>

    <div class="sidebar">
        <div class="section">
            <div class="section-title">Users</div>

            <div class="toolbar">
                <button type="button" onclick="loadUsers()">Load</button>
            </div>

            <div id="users" class="list"></div>
        </div>
    </div>
</div>

<script>
const projectsEl = document.getElementById("projects");
const actionsEl = document.getElementById("actions");
const subactionsEl = document.getElementById("subactions");
const usersEl = document.getElementById("users");
const actionsStatusEl = document.getElementById("actionsStatus");
const subactionsStatusEl = document.getElementById("subactionsStatus");

const p_name = document.getElementById("p_name");
const p_type = document.getElementById("p_type");
const p_segment = document.getElementById("p_segment");
const p_supplier = document.getElementById("p_supplier");
const p_value = document.getElementById("p_value");
const p_priority = document.getElementById("p_priority");
const p_due = document.getElementById("p_due");
const p_user = document.getElementById("p_user");

const a_name = document.getElementById("a_name");
const a_priority = document.getElementById("a_priority");
const a_due = document.getElementById("a_due");
const a_desc = document.getElementById("a_desc");
const a_project = document.getElementById("a_project");

const s_name = document.getElementById("s_name");
const s_priority = document.getElementById("s_priority");
const s_due = document.getElementById("s_due");
const s_desc = document.getElementById("s_desc");
const s_action = document.getElementById("s_action");

let selectedProjectId = null;
let selectedActionId = null;

function safeText(value) {
    return value ?? "";
}

function renderEmpty(el, text) {
    el.innerHTML = `<div class="empty-state">${text}</div>`;
}

function fmtDate(value) {
    if (!value || value === "None") return "";
    const raw = String(value);
    return raw.includes("T") ? raw.split("T")[0] : raw.split(" ")[0];
}

async function api(url, options = {}) {
    const response = await fetch(url, options);
    if (!response.ok) {
        const text = await response.text();
        throw new Error(text || `Request failed: ${response.status}`);
    }
    return response.json();
}

async function loadUsers() {
    const data = await api("/users");

    if (!data.length) {
        renderEmpty(usersEl, "No users");
        return;
    }

    usersEl.innerHTML = data.map(u => `
        <div class="list-item">
            <div class="item-main" onclick="selectUser(${u.user_id})">
                <div class="item-text">
                    <div class="item-title">${safeText(u.user_name)}</div>
                    <div class="meta">${safeText(u.user_email)}</div>
                </div>
            </div>
        </div>
    `).join("");
}

function selectUser(userId) {
    p_user.value = userId;
}

async function loadProjects() {
    const data = await api("/projects");

    if (!data.length) {
        renderEmpty(projectsEl, "No projects");
        return;
    }

    projectsEl.innerHTML = data.map(p => `
        <div class="list-item ${selectedProjectId === p.project_id ? "selected" : ""}">
            <div class="item-main" onclick="selectProject(${p.project_id})">
                <div class="item-text">
                    <div class="item-title">${safeText(p.project_name)}</div>
                    <div class="meta">
                        ${safeText(p.project_type)} ${safeText(p.project_segment)} ${safeText(p.project_priority)}
                        ${fmtDate(p.project_due_date)}
                    </div>
                </div>
            </div>

            <div class="item-actions">
                <button type="button" class="delete-btn" onclick="deleteProject(${p.project_id}, event)">Delete</button>
            </div>
        </div>
    `).join("");
}

async function selectProject(projectId) {
    selectedProjectId = projectId;
    a_project.value = projectId;
    selectedActionId = null;
    s_action.value = "";
    subactionsEl.innerHTML = "";
    subactionsStatusEl.textContent = "Select an action";
    await loadProjects();
    await loadActions();
}

async function loadActions() {
    if (!a_project.value) {
        actionsStatusEl.textContent = "Select a project";
        renderEmpty(actionsEl, "No project selected");
        return;
    }

    const projectId = Number(a_project.value);
    const data = await api(`/actions?project_id=${projectId}`);

    actionsStatusEl.textContent = `Project ID: ${projectId}`;

    if (!data.length) {
        renderEmpty(actionsEl, "No actions");
        return;
    }

    actionsEl.innerHTML = data.map(a => `
        <div class="list-item ${selectedActionId === a.action_id ? "selected" : ""}">
            <div class="item-main" onclick="selectAction(${a.action_id})">
                <input
                    class="item-checkbox"
                    type="checkbox"
                    onclick="completeAction(${a.action_id}, event)"
                >
                <div class="item-text">
                    <div class="item-title">${safeText(a.action_name)}</div>
                    <div class="meta">
                        ${safeText(a.action_priority)} ${fmtDate(a.action_due_date)} ${safeText(a.action_description)}
                    </div>
                </div>
            </div>

            <div class="item-actions">
                <button type="button" class="delete-btn" onclick="deleteAction(${a.action_id}, event)">Delete</button>
            </div>
        </div>
    `).join("");
}

async function selectAction(actionId) {
    selectedActionId = actionId;
    s_action.value = actionId;
    await loadActions();
    await loadSubactions();
}

async function loadSubactions() {
    if (!s_action.value) {
        subactionsStatusEl.textContent = "Select an action";
        renderEmpty(subactionsEl, "No action selected");
        return;
    }

    const actionId = Number(s_action.value);
    const data = await api(`/subactions?action_id=${actionId}`);

    subactionsStatusEl.textContent = `Action ID: ${actionId}`;

    if (!data.length) {
        renderEmpty(subactionsEl, "No subactions");
        return;
    }

    subactionsEl.innerHTML = data.map(s => `
        <div class="list-item">
            <div class="item-main">
                <input
                    class="item-checkbox"
                    type="checkbox"
                    onclick="completeSubaction(${s.subaction_id}, event)"
                >
                <div class="item-text">
                    <div class="item-title">${safeText(s.subaction_name)}</div>
                    <div class="meta">
                        ${safeText(s.subaction_priority)} ${fmtDate(s.subaction_due_date)} ${safeText(s.subaction_description)}
                    </div>
                </div>
            </div>

            <div class="item-actions">
                <button type="button" class="delete-btn" onclick="deleteSubaction(${s.subaction_id}, event)">Delete</button>
            </div>
        </div>
    `).join("");
}

async function createProject() {
    const params = new URLSearchParams({
        name: p_name.value,
        type: p_type.value,
        segment: p_segment.value,
        supplier: p_supplier.value,
        value: p_value.value || 0,
        priority: p_priority.value,
        due: p_due.value,
        user: p_user.value || 0
    });

    await api(`/projects?${params.toString()}`, { method: "POST" });

    p_name.value = "";
    p_type.value = "";
    p_segment.value = "";
    p_supplier.value = "";
    p_value.value = "";
    p_priority.value = "";
    p_due.value = "";

    await loadProjects();
}

async function createAction() {
    const params = new URLSearchParams({
        name: a_name.value,
        priority: a_priority.value,
        due: a_due.value,
        description: a_desc.value,
        project: a_project.value || 0
    });

    await api(`/actions?${params.toString()}`, { method: "POST" });

    a_name.value = "";
    a_priority.value = "";
    a_due.value = "";
    a_desc.value = "";

    await loadActions();
}

async function createSubaction() {
    const params = new URLSearchParams({
        name: s_name.value,
        description: s_desc.value,
        due: s_due.value,
        priority: s_priority.value,
        action: s_action.value || 0
    });

    await api(`/subactions?${params.toString()}`, { method: "POST" });

    s_name.value = "";
    s_priority.value = "";
    s_due.value = "";
    s_desc.value = "";

    await loadSubactions();
}

async function deleteProject(projectId, event) {
    event.stopPropagation();

    const result = await api(`/projects/${projectId}`, { method: "DELETE" });

    if (result.rows_deleted > 0) {
        if (selectedProjectId === projectId) {
            selectedProjectId = null;
            selectedActionId = null;
            a_project.value = "";
            s_action.value = "";
            actionsStatusEl.textContent = "Select a project";
            subactionsStatusEl.textContent = "Select an action";
            renderEmpty(actionsEl, "No project selected");
            renderEmpty(subactionsEl, "No action selected");
        }

        await loadProjects();
    } else {
        alert("Project was not deleted.");
    }
}

async function deleteAction(actionId, event) {
    event.stopPropagation();

    const result = await api(`/actions/${actionId}`, { method: "DELETE" });

    if (result.rows_deleted > 0) {
        if (selectedActionId === actionId) {
            selectedActionId = null;
            s_action.value = "";
            subactionsStatusEl.textContent = "Select an action";
            renderEmpty(subactionsEl, "No action selected");
        }

        await loadActions();
    } else {
        alert("Action was not deleted.");
    }
}

async function deleteSubaction(subactionId, event) {
    event.stopPropagation();

    const result = await api(`/subactions/${subactionId}`, { method: "DELETE" });

    if (result.rows_deleted > 0) {
        await loadSubactions();
    } else {
        alert("Subaction was not deleted.");
    }
}

async function completeAction(actionId, event) {
    event.stopPropagation();
    await api(`/actions/complete/${actionId}`, { method: "PUT" });
    await loadActions();
}

async function completeSubaction(subactionId, event) {
    event.stopPropagation();
    await api(`/subactions/complete/${subactionId}`, { method: "PUT" });
    await loadSubactions();
}

window.addEventListener("load", async () => {
    renderEmpty(projectsEl, "Load projects");
    renderEmpty(actionsEl, "No project selected");
    renderEmpty(subactionsEl, "No action selected");
    renderEmpty(usersEl, "Load users");
    await loadProjects();
});
</script>

</body>
</html>
