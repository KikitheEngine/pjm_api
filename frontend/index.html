<!DOCTYPE html>
<html>
<head>
    <title>Y.U.K.I</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f6f8;
            margin: 0;
            padding: 20px;
            color: #1c1c1e;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 { font-weight: 400; margin: 0; }

        .subtitle {
            font-size: 12px;
            color: #6e6e73;
        }

        .logo {
            height: 32px;
            opacity: 0.75;
        }

        h2 {
            font-size: 15px;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .layout { display: flex; gap: 20px; }
        .main { flex: 1; }
        .sidebar { width: 280px; }

        .section {
            background: white;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        .row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }

        input, select {
            padding: 6px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 12px;
            background: #fafafa;
        }

        button {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            background: #007aff;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th {
            text-align: left;
            font-weight: 500;
            color: #6e6e73;
            padding: 6px;
            border-bottom: 1px solid #eee;
        }

        td {
            padding: 6px;
            border-bottom: 1px solid #f0f0f0;
        }

        tr {
            transition: background 0.15s ease;
            cursor: pointer;
        }

        tr:hover {
            background: #f0f6ff;
        }

        .selected {
            background: #e6f0ff !important;
        }
    </style>
</head>

<body>

<div class="header">
    <div>
        <h1>Project Management Tool</h1>
        <div class="subtitle">Y.U.K.I Suite</div>
    </div>

    <img src="Logo_Redesign_AF_Logo.svg" class="logo">
</div>

<div class="layout">

<div class="main">

<!-- PROJECTS -->
<div class="section">
<h2>Projects</h2>

<div class="row">
<input id="filter_user_id" placeholder="User ID">
<button onclick="loadProjects()">Load</button>
</div>

<table id="projects">
<thead>
<tr><th>ID</th><th>Name</th><th>Priority</th><th>User</th></tr>
</thead>
<tbody></tbody>
</table>

<div class="row">
<input id="p_name" placeholder="Name">

<select id="p_type">
<option>Subk</option><option>IWO</option><option>Quest</option>
</select>

<select id="p_segment">
<option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
</select>

<input id="p_supplier" placeholder="Supplier">
<input id="p_value" placeholder="Value">

<select id="p_priority">
<option>High</option><option>Medium</option><option>Low</option>
</select>

<input type="date" id="p_due">
<input id="p_user" placeholder="User ID">

<button onclick="createProject()">Create</button>
</div>
</div>

<!-- ACTIONS -->
<div class="section">
<h2>Actions</h2>

<div class="row">
<input id="project_id_actions" placeholder="Project ID">
<button onclick="loadActions()">Load</button>
</div>

<table id="actions">
<thead>
<tr><th>ID</th><th>Name</th><th>Priority</th></tr>
</thead>
<tbody></tbody>
</table>

<div class="row">
<input id="a_name" placeholder="Name">

<select id="a_priority">
<option>High</option><option>Medium</option><option>Low</option>
</select>

<input type="date" id="a_due">
<input id="a_desc" placeholder="Description">
<input id="a_project" placeholder="Project ID">

<button onclick="createAction()">Create</button>
</div>
</div>

<!-- SUBACTIONS -->
<div class="section">
<h2>Subactions</h2>

<div class="row">
<input id="action_id_sub" placeholder="Action ID">
<button onclick="loadSubactions()">Load</button>
</div>

<table id="subactions">
<thead>
<tr><th>ID</th><th>Name</th><th>Priority</th></tr>
</thead>
<tbody></tbody>
</table>

<div class="row">
<input id="s_name" placeholder="Name">

<select id="s_priority">
<option>High</option><option>Medium</option><option>Low</option>
</select>

<input type="date" id="s_due">
<input id="s_desc" placeholder="Description">
<input id="s_action" placeholder="Action ID">

<button onclick="createSubaction()">Create</button>
</div>
</div>

</div>

<div class="sidebar">

<div class="section">
<h2>Create User</h2>
<input id="user_name" placeholder="Name">
<input id="user_email" placeholder="Email">
<button onclick="createUser()">Add</button>
</div>

<div class="section">
<h2>Users</h2>
<button onclick="loadUsers()">Load</button>

<table id="users">
<thead><tr><th>ID</th><th>Name</th></tr></thead>
<tbody></tbody>
</table>

</div>

</div>

</div>

<script>

function handleRowSelection(tableId) {
    const table = document.getElementById(tableId);
    table.querySelectorAll("tbody tr").forEach(row => {
        row.onclick = () => {
            table.querySelectorAll("tr").forEach(r => r.classList.remove("selected"));
            row.classList.add("selected");
        };
    });
}

// USERS
async function loadUsers() {
    const data = await (await fetch("/users")).json();
    users.querySelector("tbody").innerHTML =
        data.map(u => `<tr><td>${u.user_id}</td><td>${u.user_name}</td></tr>`).join("");
    handleRowSelection("users");
}

// PROJECTS
async function loadProjects() {
    let url = "/projects";
    if (filter_user_id.value) url += `?user_id=${filter_user_id.value}`;
    const data = await (await fetch(url)).json();

    projects.querySelector("tbody").innerHTML =
        data.map(p => `<tr><td>${p.project_id}</td><td>${p.project_name}</td><td>${p.project_priority}</td><td>${p.user_id}</td></tr>`).join("");
    handleRowSelection("projects");
}

// ACTIONS
async function loadActions() {
    const data = await (await fetch(`/actions?project_id=${project_id_actions.value}`)).json();
    actions.querySelector("tbody").innerHTML =
        data.map(a => `<tr><td>${a.action_id}</td><td>${a.action_name}</td><td>${a.action_priority}</td></tr>`).join("");
    handleRowSelection("actions");
}

// SUBACTIONS
async function loadSubactions() {
    const data = await (await fetch(`/subactions?action_id=${action_id_sub.value}`)).json();
    subactions.querySelector("tbody").innerHTML =
        data.map(s => `<tr><td>${s.subaction_id}</td><td>${s.subaction_name}</td><td>${s.subaction_priority}</td></tr>`).join("");
    handleRowSelection("subactions");
}

</script>

</body>
</html>
