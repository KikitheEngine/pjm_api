<!DOCTYPE html>
<html>
<head>
    <title>Y.U.K.I</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f6f8;
            margin: 0;
            padding: 20px;
            color: #1c1c1e;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 { font-weight: 400; margin: 0; }

        .subtitle {
            font-size: 12px;
            color: #6e6e73;
        }

        .logo {
            height: 38px;
            opacity: 0.8;
        }

        h2 {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .layout { display: flex; gap: 20px; }
        .main { flex: 1; }
        .sidebar { width: 280px; }

        .section {
            background: white;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        .row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        input, select {
            padding: 6px 8px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 12px;
            background: #fafafa;
        }

        textarea {
            padding: 6px 8px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 12px;
            background: #fafafa;
            min-width: 260px;
            min-height: 80px;
            resize: vertical;
        }

        button {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            background: #007aff;
            color: white;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.18s ease, transform 0.12s ease;
        }

        button:hover {
            background: #005ecb;
            transform: translateY(-1px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        td {
            padding: 8px 6px;
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr {
            cursor: pointer;
            transition: background 0.15s ease;
        }

        tbody tr:hover {
            background: #f0f6ff;
        }

        .selected {
            background: #e6f0ff !important;
        }
    </style>
</head>

<body>

<div class="header">
    <div>
        <h1>Project Management Tool</h1>
        <div class="subtitle">Y.U.K.I Suite</div>
    </div>

    <!-- FIXED PATH -->
    <img src="/Logo_Redesign_AF_Logo.png" class="logo">
</div>

<div class="layout">

<div class="main">

<!-- PROJECTS -->
<div class="section">
<h2>Projects</h2>

<div class="row">
<input id="filter_user_id" placeholder="User ID">
<button onclick="loadProjects()">Load</button>
</div>

<table id="projects"><tbody></tbody></table>

<div class="row">
<input id="p_name" placeholder="Name" required>

<select id="p_type" required>
<option value="">-Select Type-</option>
<option>Subk</option><option>IWO</option><option>Quest</option>
</select>

<select id="p_segment" required>
<option value="">-Select Segment-</option>
<option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
</select>

<input id="p_supplier" placeholder="Supplier" required>
<input id="p_value" placeholder="Value" required>

<select id="p_priority" required>
<option value="">-Select Priority-</option>
<option>High</option><option>Medium</option><option>Low</option>
</select>

<input type="date" id="p_due" required>
<input id="p_user" placeholder="User ID" required>

<button onclick="createProject()">Create</button>
</div>
</div>

<!-- ACTIONS -->
<div class="section">
<h2>Actions</h2>

<div class="row">
<input id="project_id_actions" placeholder="Project ID">
<button onclick="loadActions()">Load</button>
</div>

<table id="actions"><tbody></tbody></table>

<div class="row">
<input id="a_name" placeholder="Name" required>

<select id="a_priority" required>
<option value="">-Select Priority-</option>
<option>High</option><option>Medium</option><option>Low</option>
</select>

<input type="date" id="a_due" required>

<textarea id="a_desc" placeholder="Description" required></textarea>

<input id="a_project" placeholder="Project ID" required>

<button onclick="createAction()">Create</button>
</div>
</div>

<!-- SUBACTIONS -->
<div class="section">
<h2>Subactions</h2>

<div class="row">
<input id="action_id_sub" placeholder="Action ID">
<button onclick="loadSubactions()">Load</button>
</div>

<table id="subactions"><tbody></tbody></table>

<div class="row">
<input id="s_name" placeholder="Name" required>

<select id="s_priority" required>
<option value="">-Select Priority-</option>
<option>High</option><option>Medium</option><option>Low</option>
</select>

<input type="date" id="s_due" required>

<textarea id="s_desc" placeholder="Description" required></textarea>

<input id="s_action" placeholder="Action ID" required>

<button onclick="createSubaction()">Create</button>
</div>
</div>

</div>

<div class="sidebar">

<div class="section">
<h2>Create User</h2>
<input id="user_name" placeholder="Name" required>
<input id="user_email" placeholder="Email" required>
<button onclick="createUser()">Add</button>
</div>

<div class="section">
<h2>Users</h2>
<button onclick="loadUsers()">Load</button>
<table id="users"><tbody></tbody></table>
</div>

</div>

</div>

<script>

// VALIDATION
function validate(fields) {
    for (let f of fields) {
        if (!f.value) {
            alert("Please fill all fields");
            return false;
        }
    }
    return true;
}

function handleRowSelection(tableId) {
    const table = document.getElementById(tableId);
    table.querySelectorAll("tbody tr").forEach(row => {
        row.onclick = () => {
            table.querySelectorAll("tbody tr").forEach(r => r.classList.remove("selected"));
            row.classList.add("selected");
        };
    });
}

// USERS
async function createUser() {
    if (!validate([user_name, user_email])) return;

    const params = new URLSearchParams({
        name: user_name.value,
        email: user_email.value
    });

    await fetch(`/users?${params}`, { method: "POST" });
}

// PROJECTS
async function createProject() {
    if (!validate([p_name,p_type,p_segment,p_supplier,p_value,p_priority,p_due,p_user])) return;

    const params = new URLSearchParams({
        name: p_name.value,
        type: p_type.value,
        segment: p_segment.value,
        supplier: p_supplier.value,
        value: p_value.value,
        priority: p_priority.value,
        due: p_due.value,
        user: p_user.value
    });

    await fetch(`/projects?${params}`, { method: "POST" });
    loadProjects();
}

// ACTIONS
async function createAction() {
    if (!validate([a_name,a_priority,a_due,a_desc,a_project])) return;

    const params = new URLSearchParams({
        name: a_name.value,
        priority: a_priority.value,
        due: a_due.value,
        description: a_desc.value,
        project: a_project.value
    });

    await fetch(`/actions?${params}`, { method: "POST" });
    loadActions();
}

// SUBACTIONS
async function createSubaction() {
    if (!validate([s_name,s_priority,s_due,s_desc,s_action])) return;

    const params = new URLSearchParams({
        name: s_name.value,
        priority: s_priority.value,
        due: s_due.value,
        description: s_desc.value,
        action: s_action.value
    });

    await fetch(`/subactions?${params}`, { method: "POST" });
    loadSubactions();
}

</script>

</body>
</html>
