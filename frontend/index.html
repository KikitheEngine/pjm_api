<!DOCTYPE html>
<html>
<head>
    <title>PJM App</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 20px; }

        .section {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #2d6cdf;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1f4fbf;
        }

        ul {
            padding-left: 15px;
        }
    </style>
</head>

<body>

<h1>PJM Project Manager</h1>

<!-- USERS -->
<div class="section">
    <h2>Users</h2>

    <div class="row">
        <button onclick="loadUsers()">Load</button>
    </div>

    <ul id="users"></ul>

    <div class="row">
        <input id="user_name" placeholder="Name">
        <input id="user_email" placeholder="Email">
        <button onclick="createUser()">Create</button>
    </div>
</div>

<!-- PROJECTS -->
<div class="section">
    <h2>Projects</h2>

    <div class="row">
        <input id="filter_user_id" placeholder="Filter by User ID">
        <button onclick="loadProjects()">Load</button>
    </div>

    <ul id="projects"></ul>

    <div class="row">
        <input id="p_name" placeholder="Project Name">
        <input id="p_type" placeholder="Type">
        <input id="p_segment" placeholder="Segment">
        <input id="p_supplier" placeholder="Supplier">
        <input id="p_value" placeholder="Value">
        <input id="p_priority" placeholder="Priority">
        <input id="p_created" placeholder="Created">
        <input id="p_due" placeholder="Due">
        <input id="p_user" placeholder="User ID">
        <button onclick="createProject()">Create</button>
    </div>
</div>

<!-- ACTIONS -->
<div class="section">
    <h2>Actions</h2>

    <div class="row">
        <input id="project_id_actions" placeholder="Project ID">
        <button onclick="loadActions()">Load</button>
    </div>

    <ul id="actions"></ul>

    <div class="row">
        <input id="a_name" placeholder="Action Name">
        <input id="a_priority" placeholder="Priority">
        <input id="a_due" placeholder="Due">
        <input id="a_created" placeholder="Created">
        <input id="a_desc" placeholder="Description">
        <input id="a_project" placeholder="Project ID">
        <button onclick="createAction()">Create</button>
    </div>
</div>

<!-- SUBACTIONS -->
<div class="section">
    <h2>Subactions</h2>

    <div class="row">
        <input id="action_id_sub" placeholder="Action ID">
        <button onclick="loadSubactions()">Load</button>
    </div>

    <ul id="subactions"></ul>

    <div class="row">
        <input id="s_name" placeholder="Subaction Name">
        <input id="s_desc" placeholder="Description">
        <input id="s_created" placeholder="Created">
        <input id="s_due" placeholder="Due">
        <input id="s_priority" placeholder="Priority">
        <input id="s_action" placeholder="Action ID">
        <button onclick="createSubaction()">Create</button>
    </div>
</div>

<script>

// USERS
async function loadUsers() {
    const res = await fetch("/users");
    const data = await res.json();

    users.innerHTML = "";
    data.forEach(u => {
        const li = document.createElement("li");
        li.innerText = `#${u.user_id} | ${u.user_name} | ${u.user_email}`;
        users.appendChild(li);
    });
}

async function createUser() {
    const params = new URLSearchParams({
        name: user_name.value,
        email: user_email.value
    });

    await fetch(`/users?${params}`, { method: "POST" });
    loadUsers();
}


// PROJECTS
async function loadProjects() {
    let url = "/projects";
    if (filter_user_id.value) {
        url += `?user_id=${filter_user_id.value}`;
    }

    const res = await fetch(url);
    const data = await res.json();

    projects.innerHTML = "";
    data.forEach(p => {
        const li = document.createElement("li");
        li.innerText = `#${p.project_id} | ${p.project_name} (${p.project_priority})`;
        projects.appendChild(li);
    });
}

async function createProject() {
    const params = new URLSearchParams({
        name: p_name.value,
        type: p_type.value,
        segment: p_segment.value,
        supplier: p_supplier.value,
        value: p_value.value,
        priority: p_priority.value,
        created: p_created.value,
        due: p_due.value,
        user: p_user.value
    });

    await fetch(`/projects?${params}`, { method: "POST" });
    loadProjects();
}


// ACTIONS
async function loadActions() {
    const res = await fetch(`/actions?project_id=${project_id_actions.value}`);
    const data = await res.json();

    actions.innerHTML = "";
    data.forEach(a => {
        const li = document.createElement("li");
        li.innerText = `#${a.action_id} | ${a.action_name}`;
        actions.appendChild(li);
    });
}

async function createAction() {
    const params = new URLSearchParams({
        name: a_name.value,
        priority: a_priority.value,
        due: a_due.value,
        created: a_created.value,
        description: a_desc.value,
        project: a_project.value
    });

    await fetch(`/actions?${params}`, { method: "POST" });
    loadActions();
}


// SUBACTIONS
async function loadSubactions() {
    const res = await fetch(`/subactions?action_id=${action_id_sub.value}`);
    const data = await res.json();

    subactions.innerHTML = "";
    data.forEach(s => {
        const li = document.createElement("li");
        li.innerText = `#${s.subaction_id} | ${s.subaction_name}`;
        subactions.appendChild(li);
    });
}

async function createSubaction() {
    const params = new URLSearchParams({
        name: s_name.value,
        description: s_desc.value,
        created: s_created.value,
        due: s_due.value,
        priority: s_priority.value,
        action: s_action.value
    });

    await fetch(`/subactions?${params}`, { method: "POST" });
    loadSubactions();
}


// AUTO LOAD
window.onload = () => {
    loadUsers();
    loadProjects();
};

</script>

</body>
</html>
