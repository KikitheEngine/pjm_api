<!DOCTYPE html>
<html>
<head>
<title>Y.U.K.I</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background:#f5f6f8;
    padding:20px;
}

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

h2 {
    font-weight:300;
    margin:0;
}

.logo {
    height:34px;
    opacity:.8;
}

.section {
    background:white;
    padding:12px;
    border-radius:10px;
    margin-bottom:12px;
}

.row {
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-bottom:8px;
}

input, select {
    height:30px;
    padding:4px 6px;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:12px;
}

textarea {
    height:30px;
    padding:4px 6px;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:12px;
    resize:none;
    width:180px;
}

button {
    background:#007aff;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

button:hover {
    background:#005ecb;
}

table {
    width:100%;
    border-collapse:collapse;
}

td {
    padding:6px;
    border-bottom:1px solid #eee;
}

tr:hover {
    background:#f0f6ff;
}

.complete {
    opacity:.5;
    text-decoration:line-through;
}
</style>
</head>

<body>

<div class="header">
<div>
<h2>Project Management Tool</h2>
<div style="font-size:12px;color:#777;">Y.U.K.I Suite</div>
</div>

<img src="/logo.png" class="logo">
</div>

<div style="display:flex; gap:20px;">

<div style="flex:1">

<!-- PROJECTS -->
<div class="section">
<h3>Projects</h3>

<button onclick="loadProjects()">Load</button>

<table id="projects"><tbody></tbody></table>

<div class="row">
<input id="p_name" placeholder="Project Name">

<select id="p_type">
<option value="">Type</option>
<option>Subk</option><option>IWO</option><option>Quest</option>
</select>

<select id="p_segment">
<option value="">Segment</option>
<option>1</option><option>2</option><option>3</option>
</select>

<input id="p_supplier" placeholder="Supplier">
<input id="p_value" placeholder="Value">

<select id="p_priority">
<option value="">Priority</option>
<option>High</option><option>Medium</option><option>Low</option>
</select>

<input type="date" id="p_due">
<input id="p_user" placeholder="User ID">

<button onclick="createProject()">Create</button>
</div>
</div>

<!-- ACTIONS -->
<div class="section">
<h3>Actions</h3>

<table id="actions"><tbody></tbody></table>

<div class="row">
<input id="a_name" placeholder="Action Name">

<select id="a_priority">
<option value="">Priority</option>
<option>High</option><option>Medium</option><option>Low</option>
</select>

<input type="date" id="a_due">
<textarea id="a_desc" placeholder="Description"></textarea>
<input id="a_project" placeholder="Project ID">

<button onclick="createAction()">Create</button>
</div>
</div>

<!-- SUBACTIONS -->
<div class="section">
<h3>Subactions</h3>

<table id="subactions"><tbody></tbody></table>

<div class="row">
<input id="s_name" placeholder="Subaction Name">

<select id="s_priority">
<option value="">Priority</option>
<option>High</option><option>Medium</option><option>Low</option>
</select>

<input type="date" id="s_due">
<textarea id="s_desc" placeholder="Description"></textarea>
<input id="s_action" placeholder="Action ID">

<button onclick="createSubaction()">Create</button>
</div>
</div>

</div>

<div style="width:250px">

<div class="section">
<h3>Users</h3>
<button onclick="loadUsers()">Load</button>
<table id="users"><tbody></tbody></table>
</div>

</div>

</div>

<script>

// USERS
async function loadUsers() {
    const data = await (await fetch("/users")).json();
    users.innerHTML = data.map(u =>
        `<tr onclick="p_user.value=${u.user_id}"><td>${u.user_name}</td></tr>`
    ).join("");
}

// PROJECTS
async function loadProjects() {
    const data = await (await fetch("/projects")).json();
    projects.innerHTML = data.map(p =>
        `<tr onclick="a_project.value=${p.project_id};loadActions()">
        <td>${p.project_name}</td>
        <td><button onclick="deleteProject(${p.project_id});event.stopPropagation()">X</button></td>
        </tr>`
    ).join("");
}

async function deleteProject(id){
    await fetch(`/projects/${id}`, {method:"DELETE"});
    loadProjects();
}

// ACTIONS
async function loadActions() {
    let data = await (await fetch(`/actions?project_id=${a_project.value}`)).json();

    data.sort((a,b)=>{
        if(a.action_status === b.action_status){
            return new Date(a.action_due_date) - new Date(b.action_due_date);
        }
        return a.action_status - b.action_status;
    });

    actions.innerHTML = data.map(a =>
        `<tr class="${a.action_status ? 'complete':''}" onclick="s_action.value=${a.action_id};loadSubactions()">
        <td><input type="checkbox" ${a.action_status?"checked":""}
        onclick="completeAction(${a.action_id});event.stopPropagation()"></td>
        <td>${a.action_name}</td>
        </tr>`
    ).join("");
}

async function completeAction(id){
    await fetch(`/actions/complete/${id}`, {method:"PUT"});
    loadActions();
}

// SUBACTIONS
async function loadSubactions() {
    let data = await (await fetch(`/subactions?action_id=${s_action.value}`)).json();

    data.sort((a,b)=>{
        if(a.subaction_status === b.subaction_status){
            return new Date(a.subaction_due_date) - new Date(b.subaction_due_date);
        }
        return a.subaction_status - b.subaction_status;
    });

    subactions.innerHTML = data.map(s =>
        `<tr class="${s.subaction_status ? 'complete':''}">
        <td><input type="checkbox" ${s.subaction_status?"checked":""}
        onclick="completeSubaction(${s.subaction_id})"></td>
        <td>${s.subaction_name}</td>
        </tr>`
    ).join("");
}

async function completeSubaction(id){
    await fetch(`/subactions/complete/${id}`, {method:"PUT"});
    loadSubactions();
}

</script>

</body>
</html>
