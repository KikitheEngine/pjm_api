<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YUKI Project Manager</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f6f8;
      color: #222;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 24px 28px 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      left: -6px;
    }

    .brand img {
      height: 42px;
      width: auto;
      display: block;
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: white;
      border: 1px solid #d8dde6;
      border-radius: 10px;
      padding: 12px;
      min-height: 560px;
      display: flex;
      flex-direction: column;
    }

    .panel h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 600;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    input, select, textarea, button {
      font: inherit;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #c9cfda;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    button {
      height: 34px;
      border: none;
      border-radius: 8px;
      padding: 0 12px;
      background: #1f4ea3;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.94;
    }

    .secondary {
      background: #6b7280;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .item {
      border: 1px solid #d8dde6;
      border-radius: 8px;
      padding: 9px 10px;
      background: #fafbfc;
      cursor: pointer;
      transition: background 0.15s ease, border 0.15s ease;
      font-size: 13px;
    }

    .item:hover {
      background: #f0f4fa;
    }

    .item.active {
      border: 1px solid #1f4ea3;
      background: #eaf1ff;
    }

    .item.gray-out {
      opacity: 0.55;
      background: #eceff3;
    }

    .item-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .item-sub {
      font-size: 12px;
      color: #555;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .row > * {
      flex: 1;
    }

    .tiny-btn {
      height: 30px;
      font-size: 12px;
      padding: 0 10px;
    }

    .subaction-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .subaction-left {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      flex: 1;
    }

    .subaction-left input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      flex: 0 0 auto;
    }

    .muted {
      color: #666;
      font-size: 12px;
    }

    .small-text {
      font-size: 12px;
    }

    @media (max-width: 1150px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <img src="/static/Logo.png" alt="Logo" onerror="this.style.display='none'" />
        <h1>YUKI Project Manager</h1>
      </div>
    </div>

    <div class="grid">
      <!-- USERS -->
      <section class="panel">
        <h2>Users</h2>

        <div class="controls">
          <input id="userName" type="text" placeholder="User name" />
          <input id="userEmail" type="text" placeholder="User email" />
          <button onclick="createUser()">Create User</button>
          <button class="secondary" onclick="loadUsers()">Load Users</button>
        </div>

        <div id="usersList" class="list"></div>
      </section>

      <!-- PROJECTS -->
      <section class="panel">
        <h2>Projects</h2>

        <div class="controls">
          <input id="projectName" type="text" placeholder="Project name" />
          <input id="projectType" type="text" placeholder="Type (Quest, etc.)" />
          <input id="projectSegment" type="text" placeholder="Segment" />
          <input id="projectSupplier" type="text" placeholder="Supplier" />
          <input id="projectValue" type="text" placeholder="Value" />
          <input id="projectPriority" type="text" placeholder="Priority" />
          <input id="projectCreated" type="text" placeholder="Created date" />
          <input id="projectDue" type="text" placeholder="Due date" />
          <input id="projectUser" type="text" placeholder="User ID" />
          <button onclick="createProject()">Create Project</button>
          <button class="secondary" onclick="loadProjects()">Load Projects</button>
        </div>

        <div id="projectsList" class="list"></div>
      </section>

      <!-- ACTIONS -->
      <section class="panel">
        <h2>Actions</h2>

        <div class="controls">
          <input id="actionName" type="text" placeholder="Action name" />
          <input id="actionPriority" type="text" placeholder="Priority" />
          <input id="actionDue" type="text" placeholder="Due date" />
          <input id="actionCreated" type="text" placeholder="Created date" />
          <textarea id="actionDescription" placeholder="Description"></textarea>
          <button onclick="createAction()">Create Action</button>
          <button class="secondary" onclick="loadActions()">Load Actions</button>
        </div>

        <div id="actionsList" class="list"></div>
      </section>

      <!-- SUBACTIONS -->
      <section class="panel">
        <h2>Subactions</h2>

        <div class="controls">
          <input id="subactionName" type="text" placeholder="Subaction name" />
          <textarea id="subactionDescription" placeholder="Description"></textarea>
          <input id="subactionDue" type="text" placeholder="Due date" />
          <input id="subactionPriority" type="text" placeholder="Priority" />

          <div class="row small-text">
            <label style="display:flex;align-items:center;gap:8px;">
              <input id="subactionStatus" type="checkbox" style="width:16px;height:16px;" />
              Mark complete
            </label>
          </div>

          <button onclick="createSubaction()">Create Subaction</button>
          <button class="secondary" onclick="loadSubactions()">Load Subactions</button>
        </div>

        <div id="subactionsList" class="list"></div>
      </section>
    </div>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";

    let selectedProjectId = null;
    let selectedActionId = null;

    // ---------------- USERS ----------------
    async function loadUsers() {
      const res = await fetch(`${API_BASE}/users`);
      const data = await res.json();

      const list = document.getElementById("usersList");
      list.innerHTML = "";

      data.forEach(user => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <div class="item-title">${user.user_name ?? user.name ?? "Unnamed User"}</div>
          <div class="item-sub">${user.user_email ?? user.email ?? ""}</div>
        `;
        list.appendChild(div);
      });
    }

    async function createUser() {
      const name = document.getElementById("userName").value;
      const email = document.getElementById("userEmail").value;

      await fetch(`${API_BASE}/users?name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`, {
        method: "POST"
      });

      loadUsers();
    }

    // ---------------- PROJECTS ----------------
    async function loadProjects() {
      const res = await fetch(`${API_BASE}/projects`);
      const data = await res.json();

      const list = document.getElementById("projectsList");
      list.innerHTML = "";

      data.forEach(project => {
        const projectId = project.project_id ?? project.id;
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <div class="item-title">${project.project_name ?? project.name ?? "Unnamed Project"}</div>
          <div class="item-sub">${project.project_type ?? project.type ?? ""}</div>
        `;

        div.onclick = async () => {
          selectedProjectId = projectId;
          selectedActionId = null;

          document.querySelectorAll("#projectsList .item").forEach(x => x.classList.remove("active"));
          div.classList.add("active");

          await loadActions();
          document.getElementById("subactionsList").innerHTML = "";
        };

        list.appendChild(div);
      });
    }

    async function createProject() {
      const name = document.getElementById("projectName").value;
      const type = document.getElementById("projectType").value;
      const segment = document.getElementById("projectSegment").value;
      const supplier = document.getElementById("projectSupplier").value;
      const value = document.getElementById("projectValue").value;
      const priority = document.getElementById("projectPriority").value;
      const created = document.getElementById("projectCreated").value;
      const due = document.getElementById("projectDue").value;
      const user = document.getElementById("projectUser").value;

      const url = `${API_BASE}/projects?name=${encodeURIComponent(name)}&type=${encodeURIComponent(type)}&segment=${encodeURIComponent(segment)}&supplier=${encodeURIComponent(supplier)}&value=${encodeURIComponent(value)}&priority=${encodeURIComponent(priority)}&created=${encodeURIComponent(created)}&due=${encodeURIComponent(due)}&user=${encodeURIComponent(user)}`;

      await fetch(url, { method: "POST" });
      loadProjects();
    }

    // ---------------- ACTIONS ----------------
    async function loadActions() {
      const list = document.getElementById("actionsList");
      list.innerHTML = "";

      if (!selectedProjectId) return;

      const res = await fetch(`${API_BASE}/actions?project_id=${selectedProjectId}`);
      const data = await res.json();

      data.forEach(action => {
        const actionId = action.action_id ?? action.id;
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <div class="item-title">${action.action_name ?? action.name ?? "Unnamed Action"}</div>
          <div class="item-sub">
            ${action.action_priority ?? action.priority ?? ""}
            ${action.action_due_date || action.due_date ? " | Due: " + (action.action_due_date ?? action.due_date) : ""}
          </div>
        `;

        div.onclick = async () => {
          selectedActionId = actionId;

          document.querySelectorAll("#actionsList .item").forEach(x => x.classList.remove("active"));
          div.classList.add("active");

          await loadSubactions();
        };

        list.appendChild(div);
      });
    }

    async function createAction() {
      if (!selectedProjectId) {
        alert("Select a project first.");
        return;
      }

      const name = document.getElementById("actionName").value;
      const priority = document.getElementById("actionPriority").value;
      const due = document.getElementById("actionDue").value;
      const created = document.getElementById("actionCreated").value;
      const description = document.getElementById("actionDescription").value;

      const url = `${API_BASE}/actions?name=${encodeURIComponent(name)}&priority=${encodeURIComponent(priority)}&due=${encodeURIComponent(due)}&created=${encodeURIComponent(created)}&description=${encodeURIComponent(description)}&project=${selectedProjectId}`;

      await fetch(url, { method: "POST" });
      loadActions();
    }

    // ---------------- SUBACTIONS ----------------
    async function loadSubactions() {
      const list = document.getElementById("subactionsList");
      list.innerHTML = "";

      if (!selectedActionId) return;

      const res = await fetch(`${API_BASE}/subactions?action_id=${selectedActionId}`);
      const data = await res.json();

      data.forEach(sub => {
        const subId = sub.subaction_id ?? sub.id;
        const status = sub.status === true;

        const div = document.createElement("div");
        div.className = `item ${status ? "gray-out" : ""}`;

        div.innerHTML = `
          <div class="subaction-row">
            <div class="subaction-left">
              <input type="checkbox" ${status ? "checked" : ""} onchange="toggleSubactionStatus(${subId}, this.checked)" />
              <div>
                <div class="item-title">${sub.subaction_name ?? sub.name ?? "Unnamed Subaction"}</div>
                <div class="item-sub">${sub.subaction_priority ?? sub.priority ?? ""}</div>
                <div class="muted">${sub.subaction_description ?? sub.description ?? ""}</div>
              </div>
            </div>
          </div>
        `;

        list.appendChild(div);
      });
    }

    async function createSubaction() {
      if (!selectedActionId) {
        alert("Select an action first.");
        return;
      }

      const name = document.getElementById("subactionName").value;
      const description = document.getElementById("subactionDescription").value;
      const due = document.getElementById("subactionDue").value;
      const priority = document.getElementById("subactionPriority").value;
      const status = document.getElementById("subactionStatus").checked;

      const url = `${API_BASE}/subactions?name=${encodeURIComponent(name)}&description=${encodeURIComponent(description)}&due=${encodeURIComponent(due)}&priority=${encodeURIComponent(priority)}&action=${selectedActionId}&status=${status}`;

      await fetch(url, { method: "POST" });
      loadSubactions();
    }

    async function toggleSubactionStatus(subactionId, status) {
      // assumes you made an update endpoint for status
      await fetch(`${API_BASE}/subactions/${subactionId}/status?status=${status}`, {
        method: "PUT"
      });

      loadSubactions();
    }

    // initial load
    loadUsers();
    loadProjects();
  </script>
</body>
</html>
