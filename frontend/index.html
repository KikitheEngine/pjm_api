<!DOCTYPE html>
<html>
<head>
<title>Y.U.K.I</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background:#f5f6f8;
    padding:16px;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
}

h1 {
    font-weight:400;
    font-size:18px;
    margin:0;
}

.subtitle {
    font-size:11px;
    color:#777;
}

.logo {
    height:30px;
}

/* SECTIONS */
.section {
    background:white;
    padding:12px;
    border-radius:10px;
    margin-bottom:12px;
}

h3 {
    font-weight:500;
    font-size:13px;
    margin-bottom:8px;
}

/* GRID */
.row {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap:10px;
    margin-top:8px;
}

/* INPUTS */
input, select, textarea {
    height:28px;
    padding:4px 6px;
    border:1px solid #ddd;
    border-radius:6px;

    font-size:11px;
    font-family:'Inter', sans-serif;

    width:100%;
    box-sizing:border-box;
    appearance:none;
}

/* placeholder */
input::placeholder,
textarea::placeholder {
    text-align:center;
    color:#999;
}

/* BUTTON */
button {
    height:24px;
    padding:0 10px;
    font-size:10px;
    border:none;
    border-radius:6px;
    background:#007aff;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#005ecb;
}

.section button:last-child {
    margin-top:10px;
}

/* LIST UI */
.list {
    margin-top:6px;
}

.list-item {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:6px 8px;
    border-bottom:1px solid #eee;
    font-size:11px;
    cursor:pointer;
}

.list-item:hover {
    background:#f0f6ff;
}

.left {
    display:flex;
    gap:8px;
    align-items:center;
}

.meta {
    font-size:10px;
    color:#777;
}

/* LAYOUT */
.layout {
    display:flex;
    gap:16px;
}

.sidebar {
    width:220px;
}
</style>
</head>

<body>

<div class="header">
<div>
<h1>Project Management Tool</h1>
<div class="subtitle">Y.U.K.I Suite</div>
</div>

<!-- LOGO -->
<img src="./Logo.png" class="logo"
     onerror="this.src='https://via.placeholder.com/80?text=Logo'">
</div>

<div class="layout">

<div style="flex:1">

<!-- PROJECTS -->
<div class="section">
<h3>Projects</h3>

<button onclick="loadProjects()">Load</button>

<div id="projects" class="list"></div>

<div class="row">
<input id="p_name" placeholder="Project Name">
<input id="p_supplier" placeholder="Supplier">
<input id="p_value" placeholder="Value">
<input type="date" id="p_due">
<input id="p_user" placeholder="User ID">
</div>

<button onclick="createProject()">Create</button>
</div>

<!-- ACTIONS -->
<div class="section">
<h3>Actions</h3>

<div id="actions" class="list"></div>

<div class="row">
<input id="a_name" placeholder="Action Name">
<select id="a_priority">
<option value="">Priority</option>
<option>High</option><option>Medium</option><option>Low</option>
</select>
<input type="date" id="a_due">
<textarea id="a_desc" placeholder="Description"></textarea>
<input id="a_project" placeholder="Project ID">
</div>

<button onclick="createAction()">Create</button>
</div>

<!-- SUBACTIONS -->
<div class="section">
<h3>Subactions</h3>

<div id="subactions" class="list"></div>

<div class="row">
<input id="s_name" placeholder="Subaction Name">
<select id="s_priority">
<option value="">Priority</option>
<option>High</option><option>Medium</option><option>Low</option>
</select>
<input type="date" id="s_due">
<textarea id="s_desc" placeholder="Description"></textarea>
<input id="s_action" placeholder="Action ID">
</div>

<button onclick="createSubaction()">Create</button>
</div>

</div>

<div class="sidebar">

<div class="section">
<h3>Users</h3>
<button onclick="loadUsers()">Load</button>
<div id="users" class="list"></div>
</div>

</div>

</div>

<script>

// USERS
async function loadUsers() {
    const data = await (await fetch("/users")).json();
    users.innerHTML = data.map(u =>
        `<div class="list-item" onclick="p_user.value=${u.user_id}">
            ${u.user_name}
        </div>`
    ).join("");
}

// PROJECTS
async function loadProjects() {
    const data = await (await fetch("/projects")).json();
    projects.innerHTML = data.map(p =>
        `<div class="list-item" onclick="a_project.value=${p.project_id};loadActions()">
            <div class="left">
                <div>${p.project_name}</div>
            </div>
            <button onclick="deleteProject(${p.project_id});event.stopPropagation()">X</button>
        </div>`
    ).join("");
}

// ACTIONS
async function loadActions() {
    let data = await (await fetch(`/actions?project_id=${a_project.value}`)).json();

    actions.innerHTML = data.map(a =>
        `<div class="list-item" onclick="s_action.value=${a.action_id};loadSubactions()">

            <div class="left">
                <input type="checkbox" ${a.action_status?"checked":""}
                onclick="completeAction(${a.action_id});event.stopPropagation()">

                <div>
                    <div>${a.action_name}</div>
                    <div class="meta">
                        ${a.action_priority || ""} ${a.action_due_date || ""}
                    </div>
                </div>
            </div>

        </div>`
    ).join("");
}

// SUBACTIONS
async function loadSubactions() {
    let data = await (await fetch(`/subactions?action_id=${s_action.value}`)).json();

    subactions.innerHTML = data.map(s =>
        `<div class="list-item">
            <div class="left">
                <input type="checkbox" ${s.subaction_status?"checked":""}
                onclick="completeSubaction(${s.subaction_id})">

                <div>
                    <div>${s.subaction_name}</div>
                    <div class="meta">
                        ${s.subaction_priority || ""} ${s.subaction_due_date || ""}
                    </div>
                </div>
            </div>
        </div>`
    ).join("");
}

</script>

</body>
</html>
