<!DOCTYPE html>
<html>
<head>
    <title>Y.U.K.I</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f6f8;
            margin: 0;
            padding: 20px;
            color: #1c1c1e;
        }

        h1 {
            font-weight: 400;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 12px;
            color: #6e6e73;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 15px;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .layout {
            display: flex;
            gap: 20px;
        }

        .main {
            flex: 1;
        }

        .sidebar {
            width: 280px;
        }

        .section {
            background: white;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        .row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        input, select {
            padding: 6px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 12px;
            background: #fafafa;
        }

        button {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            background: #007aff;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        ul {
            padding-left: 12px;
            font-size: 12px;
        }
    </style>
</head>

<body>

<h1>Project Management Tool</h1>
<div class="subtitle">Y.U.K.I Suite</div>

<div class="layout">

    <!-- MAIN -->
    <div class="main">

        <!-- PROJECTS -->
        <div class="section">
            <h2>Projects</h2>

            <div class="row">
                <input id="filter_user_id" placeholder="User ID">
                <button onclick="loadProjects()">Load</button>
            </div>

            <ul id="projects"></ul>

            <div class="row">
                <input id="p_name" placeholder="Name">

                <select id="p_type">
                    <option value="">Type</option>
                    <option>Subk</option>
                    <option>IWO</option>
                    <option>Quest</option>
                </select>

                <select id="p_segment">
                    <option value="">Segment</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                </select>

                <input id="p_supplier" placeholder="Supplier">
                <input id="p_value" placeholder="Value">

                <select id="p_priority">
                    <option value="">Priority</option>
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>

                <input type="date" id="p_due">
                <input id="p_user" placeholder="User ID">

                <button onclick="createProject()">Create</button>
            </div>
        </div>

        <!-- ACTIONS -->
        <div class="section">
            <h2>Actions</h2>

            <div class="row">
                <input id="project_id_actions" placeholder="Project ID">
                <button onclick="loadActions()">Load</button>
            </div>

            <ul id="actions"></ul>

            <div class="row">
                <input id="a_name" placeholder="Name">

                <select id="a_priority">
                    <option value="">Priority</option>
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>

                <input type="date" id="a_due">
                <input id="a_desc" placeholder="Description">
                <input id="a_project" placeholder="Project ID">

                <button onclick="createAction()">Create</button>
            </div>
        </div>

        <!-- SUBACTIONS -->
        <div class="section">
            <h2>Subactions</h2>

            <div class="row">
                <input id="action_id_sub" placeholder="Action ID">
                <button onclick="loadSubactions()">Load</button>
            </div>

            <ul id="subactions"></ul>

            <div class="row">
                <input id="s_name" placeholder="Name">

                <select id="s_priority">
                    <option value="">Priority</option>
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>

                <input type="date" id="s_due">
                <input id="s_desc" placeholder="Description">
                <input id="s_action" placeholder="Action ID">

                <button onclick="createSubaction()">Create</button>
            </div>
        </div>

    </div>

    <!-- SIDEBAR USERS -->
    <div class="sidebar">

        <div class="section">
            <h2>Create User</h2>
            <div class="row">
                <input id="user_name" placeholder="Name">
                <input id="user_email" placeholder="Email">
            </div>
            <button onclick="createUser()">Add</button>
        </div>

        <div class="section">
            <h2>Users</h2>
            <button onclick="loadUsers()">Load</button>
            <ul id="users"></ul>
        </div>

    </div>

</div>

<script>

// USERS
async function loadUsers() {
    const res = await fetch("/users");
    const data = await res.json();
    users.innerHTML = "";
    data.forEach(u => {
        users.innerHTML += `<li>#${u.user_id} | ${u.user_name}</li>`;
    });
}

async function createUser() {
    const params = new URLSearchParams({
        name: user_name.value,
        email: user_email.value
    });
    await fetch(`/users?${params}`, { method: "POST" });
}


// PROJECTS
async function loadProjects() {
    let url = "/projects";
    if (filter_user_id.value) url += `?user_id=${filter_user_id.value}`;

    const res = await fetch(url);
    const data = await res.json();

    projects.innerHTML = "";
    data.forEach(p => {
        projects.innerHTML += `<li>#${p.project_id} | ${p.project_name}</li>`;
    });
}

async function createProject() {
    const params = new URLSearchParams({
        name: p_name.value,
        type: p_type.value,
        segment: p_segment.value,
        supplier: p_supplier.value,
        value: p_value.value,
        priority: p_priority.value,
        due: p_due.value,
        user: p_user.value
    });

    await fetch(`/projects?${params}`, { method: "POST" });
    loadProjects();
}


// ACTIONS
async function loadActions() {
    const res = await fetch(`/actions?project_id=${project_id_actions.value}`);
    const data = await res.json();

    actions.innerHTML = "";
    data.forEach(a => {
        actions.innerHTML += `<li>#${a.action_id} | ${a.action_name}</li>`;
    });
}

async function createAction() {
    const params = new URLSearchParams({
        name: a_name.value,
        priority: a_priority.value,
        due: a_due.value,
        description: a_desc.value,
        project: a_project.value
    });

    await fetch(`/actions?${params}`, { method: "POST" });
    loadActions();
}


// SUBACTIONS
async function loadSubactions() {
    const res = await fetch(`/subactions?action_id=${action_id_sub.value}`);
    const data = await res.json();

    subactions.innerHTML = "";
    data.forEach(s => {
        subactions.innerHTML += `<li>#${s.subaction_id} | ${s.subaction_name}</li>`;
    });
}

async function createSubaction() {
    const params = new URLSearchParams({
        name: s_name.value,
        priority: s_priority.value,
        due: s_due.value,
        description: s_desc.value,
        action: s_action.value
    });

    await fetch(`/subactions?${params}`, { method: "POST" });
    loadSubactions();
}

</script>

</body>
</html>
